name: Android CI

on:
  push:
    branches:
      - canary
      - main
      - experimental
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '9.2.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Get commit hash
        id: commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "full_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update version name with commit hash
        run: |
          sed -i 's/versionName = "21.6"/versionName = "21.6-${{ steps.commit.outputs.hash }}"/g' app/build.gradle.kts

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 --decode > canary.jks
          echo "CANARY_STORE_FILE=$(pwd)/canary.jks" >> $GITHUB_ENV
          echo "CANARY_STORE_PASSWORD=${{ secrets.CANARY_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "CANARY_KEY_ALIAS=${{ secrets.CANARY_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "CANARY_KEY_PASSWORD=${{ secrets.CANARY_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build standard Release APK
        run: ./gradlew assembleStandardRelease

      - name: Build withPlayer Release APK
        run: ./gradlew assembleWithPlayerRelease

      - name: List APK files
        run: |
          echo "=== APK files ==="
          find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/standard/release/*.apk
            app/build/outputs/apk/withPlayer/release/*.apk
          name: Canary 21.6-${{ steps.commit.outputs.hash }} (${{ steps.date.outputs.date }})
          tag_name: build-${{ steps.commit.outputs.hash }}
          body: |
            ## 🔨 Build Information
            - **Version**: 21.6-${{ steps.commit.outputs.hash }}
            - **Commit Hash**: ${{ steps.commit.outputs.full_hash }}
            - **Build Date**: ${{ steps.date.outputs.date }}
            - **Branch**: ${{ github.ref_name }}
            
            ## 📦 Build Variants
            - **Standard**: 基础版本（不含播放器）
            - **WithPlayer**: 完整版本（包含播放器）
            
            ## 📝 Latest Commit
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Canary-21.6-${{ steps.commit.outputs.hash }}
          path: |
            app/build/outputs/apk/standard/release/*.apk
            app/build/outputs/apk/withPlayer/release/*.apk
          retention-days: 30
