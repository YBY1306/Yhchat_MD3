name: Android Debug CI

on:
  workflow_dispatch:
  push:
    branches:
      - canary
      - main
      - experimental

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: standard
            gradle_task: assembleStandardDebug
            artifact_name: apk-standard-debug
            asset_name: app-standard-debug.apk
          - flavor: miuix
            gradle_task: assembleMiuixDebug
            artifact_name: apk-miuix-debug
            asset_name: app-miuix-debug.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: "9.2.1"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable 8G swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Active swap ==="
          swapon --show
          echo "=== Memory ==="
          free -h

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Get commit hash
        id: commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Build ${{ matrix.flavor }} debug APK
        run: ./gradlew ${{ matrix.gradle_task }} -PciVersionNameSuffix=${{ steps.commit.outputs.hash }}

      - name: Collect ${{ matrix.flavor }} APK
        run: |
          mkdir -p dist
          APK_PATH=$(find "app/build/outputs/apk/${{ matrix.flavor }}/debug" -maxdepth 1 -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found for ${{ matrix.flavor }}" >&2
            exit 1
          fi
          cp "$APK_PATH" "dist/${{ matrix.asset_name }}"
          ls -lh dist

      - name: Upload ${{ matrix.flavor }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 30
