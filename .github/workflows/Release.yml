name: Release release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '自定义发布 tag（留空则默认使用 build-<commit_hash>）'
        required: false
        default: ''
      last_tag:
        description: '更新日志起始 tag/ref（可选，例如 v0.0.21-5）'
        required: false
        default: ''
      latest_tag:
        description: '更新日志结束 tag/ref（可选，例如 experimental）'
        required: false
        default: 'experimental'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: standard
            gradle_task: assembleStandardRelease
            artifact_name: apk-standard
            asset_name: app-standard-release.apk
          - flavor: miuix
            gradle_task: assembleMiuixRelease
            artifact_name: apk-miuix
            asset_name: app-miuix-release.apk
          - flavor: player
            gradle_task: assemblePlayerRelease
            artifact_name: apk-player
            asset_name: app-player-release.apk
          - flavor: playermiuix
            gradle_task: assemblePlayermiuixRelease
            artifact_name: apk-playermiuix
            asset_name: app-playermiuix-release.apk
          - flavor: live
            gradle_task: assembleLiveRelease
            artifact_name: apk-live
            asset_name: app-live-release.apk
          - flavor: livemiuix
            gradle_task: assembleLivemiuixRelease
            artifact_name: apk-livemiuix
            asset_name: app-livemiuix-release.apk
          - flavor: full
            gradle_task: assembleFullRelease
            artifact_name: apk-full
            asset_name: app-full-release.apk
          - flavor: fullmiuix
            gradle_task: assembleFullmiuixRelease
            artifact_name: apk-fullmiuix
            asset_name: app-fullmiuix-release.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '9.2.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable 8G swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Active swap ==="
          swapon --show
          echo "=== Memory ==="
          free -h

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 --decode > canary.jks
          echo "CANARY_STORE_FILE=$(pwd)/canary.jks" >> $GITHUB_ENV
          echo "CANARY_STORE_PASSWORD=${{ secrets.CANARY_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "CANARY_KEY_ALIAS=${{ secrets.CANARY_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "CANARY_KEY_PASSWORD=${{ secrets.CANARY_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Get commit hash
        id: commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Build ${{ matrix.flavor }} release APK
        run: ./gradlew ${{ matrix.gradle_task }} -PciVersionNameSuffix=${{ steps.commit.outputs.hash }}

      - name: Collect ${{ matrix.flavor }} APK
        run: |
          mkdir -p dist
          APK_PATH=$(find "app/build/outputs/apk/${{ matrix.flavor }}/release" -maxdepth 1 -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found for ${{ matrix.flavor }}" >&2
            exit 1
          fi
          cp "$APK_PATH" "dist/${{ matrix.asset_name }}"
          ls -lh dist

      - name: Upload ${{ matrix.flavor }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          merge-multiple: true
          path: release-assets

      - name: List APK files
        run: |
          echo "=== APK files ==="
          find release-assets -name "*.apk" -type f -exec ls -lh {} \;

      - name: Get commit hash
        id: commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "full_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Read version name from Gradle
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/^[[:space:]]*val baseVersionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)
          if [ -z "$VERSION_NAME" ]; then
            echo "Failed to read baseVersionName from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "release_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Prepare release metadata
        id: release_meta
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          LAST_TAG_INPUT="${{ github.event.inputs.last_tag }}"
          LATEST_TAG_INPUT="${{ github.event.inputs.latest_tag }}"
          VAR_TAG="${{ vars.RELEASE_TAG }}"

          if [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
          elif [ -n "$VAR_TAG" ]; then
            TAG_NAME="$VAR_TAG"
          else
            TAG_NAME="build-${{ steps.commit.outputs.hash }}"
          fi
          STANDARD_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-standard-release.apk"
          MIUIX_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-miuix-release.apk"
          PLAYER_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-player-release.apk"
          PLAYER_MIUIX_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-playermiuix-release.apk"
          LIVE_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-live-release.apk"
          LIVE_MIUIX_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-livemiuix-release.apk"
          FULL_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-full-release.apk"
          FULL_MIUIX_APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/app-fullmiuix-release.apk"
          BEFORE_SHA="${{ github.event.before }}"
          EMPTY_BEFORE="0000000000000000000000000000000000000000"
          FULL_CHANGELOG_LINE=""

          if [ -n "$LAST_TAG_INPUT" ] && [ -n "$LATEST_TAG_INPUT" ]; then
            CHANGELOG=$(git log --format='- %s' "${LAST_TAG_INPUT}..${LATEST_TAG_INPUT}")
            COMMIT_LIST=$(git log --format='- `%h` %s (%an)' "${LAST_TAG_INPUT}..${LATEST_TAG_INPUT}")
            FULL_CHANGELOG_LINE="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG_INPUT}...${LATEST_TAG_INPUT}"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$EMPTY_BEFORE" ]; then
            CHANGELOG=$(git log --format='- %s' "${BEFORE_SHA}..HEAD")
            COMMIT_LIST=$(git log --format='- `%h` %s (%an)' "${BEFORE_SHA}..HEAD")
          else
            CHANGELOG=$(git log -n 10 --format='- %s')
            COMMIT_LIST=$(git log -n 10 --format='- `%h` %s (%an)')
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- ${COMMIT_MESSAGE}"
          fi

          if [ -z "$COMMIT_LIST" ]; then
            COMMIT_LIST="- \`${{ steps.commit.outputs.hash }}\` ${COMMIT_MESSAGE}"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          cat > release-body.md <<EOF
          ## Build Information
          - **Version**: ${{ steps.version.outputs.release_name }}
          - **Commit Hash**: ${{ steps.commit.outputs.full_hash }}
          - **Build Date**: ${{ steps.date.outputs.date }}
          - **Branch**: ${{ github.ref_name }}

          ## Build Variants
          - **Standard**: [app-standard-release.apk](${STANDARD_APK_URL})
          - **Miuix**: [app-miuix-release.apk](${MIUIX_APK_URL})
          - **Player**: [app-player-release.apk](${PLAYER_APK_URL})
          - **PlayerMiuix**: [app-playermiuix-release.apk](${PLAYER_MIUIX_APK_URL})
          - **Live**: [app-live-release.apk](${LIVE_APK_URL})
          - **LiveMiuix**: [app-livemiuix-release.apk](${LIVE_MIUIX_APK_URL})
          - **Full**: [app-full-release.apk](${FULL_APK_URL})
          - **FullMiuix**: [app-fullmiuix-release.apk](${FULL_MIUIX_APK_URL})

          ## Changelog
          ${CHANGELOG}

          ## Commit List
          ${COMMIT_LIST}

          ${FULL_CHANGELOG_LINE}
          EOF

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.apk
          name: Canary ${{ steps.version.outputs.release_name }}
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          body_path: release-body.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
